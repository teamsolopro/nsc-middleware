<style>
  /* ── Company Detail page ────────────────────────────────── */
  .nsc-co-detail { font-family: 'Lato', sans-serif; max-width: 1000px; margin: 0 auto; padding: 0 16px 60px; }

  /* Header */
  .nsc-co-header {
    display: flex; align-items: flex-start; gap: 28px;
    padding: 32px 0 24px; border-bottom: 2px solid #d6e6f5; margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .nsc-co-detail-logo { max-width: 160px; max-height: 120px; object-fit: contain; flex-shrink: 0; }
  .nsc-co-header-info { flex: 1; min-width: 220px; }
  .nsc-co-detail-name {
    font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700;
    color: #1e3a5f; margin: 0 0 8px;
  }
  .nsc-co-meta { font-size: 14px; color: #555; margin: 0 0 4px; }
  .nsc-co-website {
    display: inline-block; margin-top: 10px; font-size: 14px; font-weight: 600;
    color: #4477a1; text-decoration: none;
  }
  .nsc-co-website:hover { text-decoration: underline; }
  .nsc-co-social-row { margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
  .nsc-co-social {
    font-size: 13px; color: #6699c2; text-decoration: none; font-weight: 600;
    border: 1px solid #6699c2; border-radius: 4px; padding: 3px 10px;
  }
  .nsc-co-social:hover { background: #6699c2; color: #fff; }

  /* Bio */
  .nsc-co-bio { font-family: 'Cormorant Garamond', serif; font-size: 18px; line-height: 1.65; color: #333; margin: 0; }

  /* Sections */
  .nsc-co-section { margin-bottom: 40px; }
  .nsc-co-section-title {
    font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; color: #6699c2;
    border-bottom: 2px solid #d6e6f5; padding-bottom: 6px; margin: 0 0 18px;
  }

  /* Venues */
  .nsc-co-venue-list { display: flex; flex-direction: column; gap: 10px; }
  .nsc-co-venue-card {
    background: #f5f3ee; border-radius: 6px; padding: 12px 16px;
    font-size: 14px; color: #1a1a1a; line-height: 1.5;
  }
  .nsc-co-link { color: #4477a1; text-decoration: none; }
  .nsc-co-link:hover { text-decoration: underline; }

  /* Production cards */
  .nsc-co-prod-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;
  }
  .nsc-co-prod-card {
    display: flex; flex-direction: column; background: #fff;
    border: 1px solid #dce8f0; border-radius: 8px; overflow: hidden;
    text-decoration: none; color: inherit; transition: box-shadow 0.15s;
  }
  .nsc-co-prod-card:hover { box-shadow: 0 3px 12px rgba(68,119,161,0.15); }
  .nsc-co-prod-poster { width: 100%; height: 140px; object-fit: cover; }
  .nsc-co-prod-no-poster { width: 100%; height: 140px; background: #d6e6f5; }
  .nsc-co-prod-info { padding: 12px 14px; }
  .nsc-co-prod-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; margin: 4px 0 6px; color: #1a1a1a; }
  .nsc-card-label { font-size: 11px; font-weight: 700; color: #6699c2; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Audition cards */
  .nsc-co-aud-list { display: flex; flex-direction: column; gap: 10px; }
  .nsc-co-aud-card {
    display: block; background: #fff; border: 1px solid #dce8f0;
    border-radius: 8px; padding: 14px 18px; text-decoration: none; color: inherit;
    transition: box-shadow 0.15s;
  }
  .nsc-co-aud-card:hover { box-shadow: 0 3px 12px rgba(68,119,161,0.12); }
  .nsc-co-aud-info {}

  /* Past productions table */
  .nsc-co-past-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .nsc-co-past-table th { text-align: left; font-size: 12px; font-weight: 700; color: #888; padding: 6px 10px; border-bottom: 1px solid #ddd; }
  .nsc-co-past-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; color: #333; }
  .nsc-co-past-table tr:last-child td { border-bottom: none; }

  /* Back link */
  .nsc-co-back { margin-top: 40px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
  .nsc-co-back a { color: #4477a1; text-decoration: none; font-size: 14px; font-weight: 600; }
  .nsc-co-back a:hover { text-decoration: underline; }

  .nsc-empty { text-align: center; color: #999; padding: 3rem; font-style: italic; }
</style>

<div id="nsc-company-detail">
  <p style="font-family:'Lato',sans-serif;color:#999;padding:2rem">Loading…</p>
</div>

<script src="https://cdn.neighborhoodstage.com/assets/js/company-detail.js"></script>
