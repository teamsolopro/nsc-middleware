<style>
  /* ── Companies page ─────────────────────────────────────── */
  .nsc-co-page { font-family: 'Lato', sans-serif; max-width: 1100px; margin: 0 auto; padding: 0 16px 60px; }

  .nsc-co-filters {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-bottom: 28px; padding: 16px; background: #f5f3ee; border-radius: 8px;
  }
  .nsc-co-filters input[type=text],
  .nsc-co-filters select {
    font-family: 'Lato', sans-serif; font-size: 14px;
    padding: 9px 12px; border: 1px solid #c8d8e8; border-radius: 6px;
    background: #fff; color: #1a1a1a; flex: 1; min-width: 180px;
  }
  .nsc-co-filters input[type=text]:focus,
  .nsc-co-filters select:focus { outline: 2px solid #6699c2; border-color: #6699c2; }

  .nsc-co-count { font-size: 13px; color: #666; margin-bottom: 16px; }

  .nsc-co-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .nsc-co-card {
    display: flex; flex-direction: column; align-items: center; text-align: center;
    background: #fff; border: 1px solid #dce8f0; border-radius: 10px;
    padding: 24px 20px; text-decoration: none; color: inherit;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .nsc-co-card:hover { box-shadow: 0 4px 16px rgba(68,119,161,0.15); transform: translateY(-2px); }

  .nsc-co-logo-wrap { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .nsc-co-logo { max-width: 100%; max-height: 100%; object-fit: contain; }
  .nsc-co-logo-placeholder {
    width: 80px; height: 80px; border-radius: 50%;
    background: #d6e6f5; color: #3d5a80;
    font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .nsc-co-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; margin: 0 0 6px; color: #1a1a1a; }
  .nsc-co-location { font-size: 13px; color: #555; margin: 0 0 4px; }
  .nsc-co-region { font-size: 12px; color: #6699c2; margin: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .nsc-co-empty { text-align: center; color: #999; padding: 3rem; font-style: italic; }
  .nsc-co-loading { text-align: center; color: #999; padding: 2rem; }
</style>

<div class="nsc-co-page">
  <div class="nsc-co-filters">
    <input type="text" id="nsc-co-search" placeholder="Search by name…" autocomplete="off">
    <select id="nsc-co-region">
      <option value="">All Regions</option>
      <option>Charlotte metro</option>
      <option>Triad</option>
      <option>Triangle</option>
      <option>Wilmington / Cape Fear</option>
      <option>Asheville / Western NC</option>
      <option>Lowcountry</option>
      <option>Upstate SC</option>
      <option>Other NC</option>
      <option>Other SC</option>
    </select>
  </div>

  <p class="nsc-co-count" id="nsc-companies-count"></p>
  <p class="nsc-co-loading" id="nsc-co-loading">Loading companies…</p>
  <p class="nsc-co-empty" id="nsc-co-empty" style="display:none">No companies match your search.</p>
  <div class="nsc-co-grid" id="nsc-companies-grid"></div>
</div>

<script src="https://cdn.neighborhoodstage.com/assets/js/companies.js"></script>
